services:
  dev:
    build:
      context: ./
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    working_dir: /app
    tty: true
    stdin_open: true
    command: cargo watch -x run

  build:
    build:
      context: ./
      dockerfile: Dockerfile
      target: runtime
    profiles:
      - release

volumes:
  cargo-registry:
  cargo-git:
